  title: Why Guided Dialog Policy Learning performs well? Understanding the role of adversarial learning and its alternative
  authors:
  - Sho Shimoyama
  - Tetsuro Morimura
  - Kenshi Abe
  - Toda Takamichi
  - Yuta Tomomatsu
  - Masakazu Sugiyama
