# -- Theme Options --
# https://blowfish.page/docs/configuration/#theme-parameters

colorScheme = "ocean"
defaultAppearance = "light" # valid options: light or dark
autoSwitchAppearance = true # respect the visitor's system preference

enableA11y = true
enableSearch = true
enableCodeCopy = true

replyByEmail = false

# Sections that count as "main content" (used by recent lists, search, etc.)
mainSections = ["research"]

# Site owner's name in every spelling it appears as in publication author lists.
# Used to bold the owner among co-authors. JA pages mix EN and JA papers, so both
# spellings must be listed (language-independent on purpose).
selfNames = ["Kenshi Abe", "阿部 拳之"]

disableImageOptimization = false
hotlinkFeatureImage = false

fingerprintAlgorithm = "sha512"

[header]
  layout = "fixed-fill-blur" # subtle, modern sticky header

[footer]
  showMenu = false
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile" # author profile as the landing page
  showRecent = false # research themes live on /research/; top features Selected Publications
  showRecentItems = 6
  showMoreLink = true
  showMoreLinkDest = "/research/"
  cardView = true
  cardViewScreenWidth = false

[article]
  showDate = false
  showAuthor = false
  showHero = false
  showBreadcrumbs = true
  showDraftLabel = true
  showEdit = false
  showHeadingAnchors = true
  showPagination = false
  showReadingTime = false
  showTableOfContents = true
  showTaxonomies = true
  showTags = true
  showCategories = false
  showWordCount = false
  showZenMode = false

[list]
  showHero = false
  showBreadcrumbs = false
  showSummary = true
  showTableOfContents = false
  orderByWeight = false
  groupByYear = false
  cardView = false # enabled per-section via front matter (see research/_index.md)
  cardViewScreenWidth = false
  constrainItemsWidth = true

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true
  showHero = false
  showBreadcrumbs = false
  showTableOfContents = false
  cardView = false

[term]
  showHero = false
  showBreadcrumbs = false
  showTableOfContents = false
  groupByYear = false
  cardView = true # tag/term pages show research as cards
  cardViewScreenWidth = false
